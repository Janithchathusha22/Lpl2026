<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>LPL 2026 — 3D Fielding + Delivery Simulator</title>
<style>
:root{--bg:#05080f;--panel:#0c1120;--border:#1a2540;--gold:#f5a623;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:#e8eaf0;font-family:'Segoe UI',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
header{background:linear-gradient(135deg,#0d1428,#060a14);border-bottom:2px solid var(--gold);padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
header h1{font-size:1.1rem;color:var(--gold);}
header p{font-size:0.7rem;color:#667;}
.team-tabs{display:flex;gap:4px;padding:10px 14px 0;background:#080c18;border-bottom:1px solid #1a2540;flex-shrink:0;flex-wrap:wrap;}
.team-tab{padding:7px 14px;border:none;border-radius:6px 6px 0 0;cursor:pointer;font-size:0.8rem;font-weight:700;transition:all .2s;}
.main{display:flex;flex:1;overflow:hidden;}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;cursor:grab;background:radial-gradient(ellipse at 50% 40%,#0a1828 0%,#04080f 100%);}
.canvas-wrap:active{cursor:grabbing;}
canvas{display:block;}
.hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:0.68rem;color:#333;pointer-events:none;}
.sidebar{width:268px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:14px;flex-shrink:0;}
.sidebar h2{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:10px;}
.bat-btn{display:block;width:100%;padding:9px 11px;background:rgba(255,255,255,0.03);border:1px solid #1a2540;border-radius:7px;cursor:pointer;text-align:left;margin-bottom:7px;color:#eee;transition:all .15s;}
.bat-btn:hover{background:rgba(255,255,255,0.07);}
.bat-btn.active{background:rgba(255,255,255,0.09);}
.bat-btn .nm{font-weight:700;font-size:0.88rem;}
.bat-btn .dt{font-size:0.72rem;color:#888;margin-top:2px;}
.ibox{background:rgba(255,255,255,0.04);border-radius:7px;padding:11px;margin-top:12px;border:1px solid #1a2540;}
.ibox h3{font-size:0.68rem;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.irow{display:flex;justify-content:space-between;align-items:flex-start;font-size:0.76rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);gap:8px;}
.leg-item{display:flex;align-items:center;gap:7px;font-size:0.74rem;margin-bottom:5px;color:#bbb;}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* START BUTTON */
.start-btn{display:block;width:100%;padding:13px;border:none;border-radius:9px;font-size:0.95rem;font-weight:700;cursor:pointer;margin-bottom:12px;transition:all .2s;letter-spacing:.5px;}
.start-btn:hover{transform:translateY(-2px);}
.start-btn.ready{background:linear-gradient(135deg,#1a8a3a,#15692d);color:#fff;box-shadow:0 4px 16px rgba(26,138,58,0.4);}
.start-btn.bowling{background:linear-gradient(135deg,#c74a1a,#a03010);color:#fff;animation:pulse .6s infinite alternate;cursor:not-allowed;}
.start-btn.reset{background:linear-gradient(135deg,#1a4fc7,#1235a0);color:#fff;}
@keyframes pulse{from{box-shadow:0 0 8px rgba(199,74,26,0.4)}to{box-shadow:0 0 24px rgba(199,74,26,0.8)}}

/* DELIVERY INFO BOX */
.delivery-box{background:rgba(255,255,255,0.03);border:1px solid #1a2540;border-radius:8px;padding:10px;margin-bottom:12px;min-height:44px;}
.del-type{font-size:0.82rem;font-weight:700;margin-bottom:4px;}
.del-speed{font-size:0.7rem;color:#888;}
.del-shot{font-size:0.78rem;color:#aab;margin-top:4px;font-style:italic;}

/* RESEARCH PANEL */
.research-box{background:linear-gradient(135deg,rgba(26,60,120,0.25),rgba(10,20,50,0.5));border:1px solid #1a3060;border-radius:8px;padding:11px;margin-top:12px;}
.research-box h3{font-size:0.68rem;color:#7a9de8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.catch-prob{text-align:center;margin-bottom:10px;}
.catch-prob-val{font-size:2rem;font-weight:900;line-height:1;}
.catch-prob-lbl{font-size:0.65rem;color:#556;margin-top:2px;}
.prob-bar-wrap{height:6px;background:#1a2030;border-radius:3px;margin:6px 0;}
.prob-bar-fill{height:6px;border-radius:3px;transition:width .8s;}
.research-stat{display:flex;justify-content:space-between;font-size:0.72rem;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.research-note{font-size:0.68rem;color:#445;line-height:1.5;margin-top:7px;}

/* RESULT OVERLAY */
#resultOverlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(5,8,15,0.92);border-radius:16px;padding:24px 32px;text-align:center;
  pointer-events:none;opacity:0;transition:opacity .3s;z-index:10;min-width:220px;backdrop-filter:blur(8px);}
#resultOverlay.show{opacity:1;}
.res-emoji{font-size:2.8rem;margin-bottom:8px;}
.res-title{font-size:1.6rem;font-weight:900;letter-spacing:1px;margin-bottom:6px;}
.res-detail{font-size:0.82rem;color:#aab;line-height:1.5;}
.res-fielder{font-size:0.78rem;margin-top:8px;padding:5px 12px;border-radius:20px;display:inline-block;}

/* BALL TRAIL */
.phase-indicator{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.7);border-radius:20px;padding:5px 14px;font-size:0.75rem;
  font-weight:700;letter-spacing:.5px;opacity:0;transition:opacity .3s;pointer-events:none;}
.phase-indicator.show{opacity:1;}

@media(max-width:700px){.main{flex-direction:column}.sidebar{width:100%;height:220px;overflow-y:auto}canvas{max-width:100%}}
</style>

// 3D ENGINE
// ═══════════════════════════════════════════════════════════════════
const canvas=document.getElementById('fld');
const ctx=canvas.getContext('2d');
const W=canvas.width, H=canvas.height, CX=W/2, CY=H/2+20, FS=200;

function project(wx,wy,wz){
  const cy=Math.cos(rotY),sy=Math.sin(rotY);
  let x1=wx*cy+wz*sy, z1=-wx*sy+wz*cy, y1=wy;
  const cx=Math.cos(rotX),sx=Math.sin(rotX);
  let x2=x1, y2=y1*cx-z1*sx, z2=y1*sx+z1*cx;
  const fov=3.8, sc=(fov/(fov+z2))*FS*zoom;
  return{sx:CX+x2*sc, sy:CY+y2*sc, depth:z2, sc};
}

function bezierPt(p0,p1,p2,t){
  return{
    x:(1-t)*(1-t)*p0.x+2*(1-t)*t*p1.x+t*t*p2.x,
    y:(1-t)*(1-t)*p0.y+2*(1-t)*t*p1.y+t*t*p2.y,
    z:(1-t)*(1-t)*p0.z+2*(1-t)*t*p1.z+t*t*p2.z,
  };
}

// ═══════════════════════════════════════════════════════════════════
// DRAW FUNCTIONS
// ═══════════════════════════════════════════════════════════════════
const RCOL={
  wk:   {dot:'#a0dfff',ring:'#55aee0',lbl:'#b0e8ff'},
  close:{dot:'#ff6868',ring:'#e03030',lbl:'#ff9090'},
  ring: {dot:'#ffe055',ring:'#e0a010',lbl:'#ffe880'},
  deep: {dot:'#55e07a',ring:'#20b040',lbl:'#80e8a0'},
};

function drawGroundOval(rx,rz,fill,stroke,lw,steps=72){
  const pts=Array.from({length:steps+1},(_,i)=>{
    const a=i/steps*Math.PI*2;
    return project(Math.cos(a)*rx,0,Math.sin(a)*rz);
  });
  ctx.beginPath(); ctx.moveTo(pts[0].sx,pts[0].sy);
  pts.slice(1).forEach(p=>ctx.lineTo(p.sx,p.sy)); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}

function drawPitch(){
  const pts=[[-0.046,0,-0.28],[0.046,0,-0.28],[0.046,0,0.28],[-0.046,0,0.28]].map(c=>project(...c));
  ctx.beginPath(); ctx.moveTo(pts[0].sx,pts[0].sy);
  pts.slice(1).forEach(p=>ctx.lineTo(p.sx,p.sy));
  ctx.closePath(); ctx.fillStyle='#c4a045'; ctx.fill();
  ctx.strokeStyle='#a08030'; ctx.lineWidth=1; ctx.stroke();
  [[[-0.046,0,0.13],[0.046,0,0.13]],[[-0.046,0,-0.13],[0.046,0,-0.13]]].forEach(([a,b])=>{
    const p1=project(...a),p2=project(...b);
    ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy);
    ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1.5; ctx.stroke();
  });
  [[-0.012,0.15],[0,0.15],[0.012,0.15],[-0.012,-0.15],[0,-0.15],[0.012,-0.15]].forEach(([sx,sz])=>{
    const b=project(sx,0,sz),t=project(sx,0.05,sz);
    ctx.beginPath(); ctx.moveTo(b.sx,b.sy); ctx.lineTo(t.sx,t.sy);
    ctx.strokeStyle='#f5c842'; ctx.lineWidth=2.5; ctx.stroke();
  });
}

function drawLabel(txt,wx,wy,wz,color,size){
  const p=project(wx,wy,wz);
  ctx.save(); ctx.shadowColor='#000'; ctx.shadowBlur=5;
  ctx.fillStyle=color;
  ctx.font=`bold ${Math.max(8,size*(p.sc/FS))}px Segoe UI`;
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText(txt,p.sx,p.sy); ctx.restore();
}

function drawPlayer(pos,idx,dimmed){
  const p=project(pos.x,0.02,pos.z);
  const rc=RCOL[pos.t];
  const r=Math.max(6,9.5*(p.sc/FS));
  const alpha=dimmed?0.3:1.0;
  ctx.globalAlpha=alpha;
  const g=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r*3);
  g.addColorStop(0,rc.dot+'66'); g.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(p.sx,p.sy,r*3,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.arc(p.sx,p.sy,r,0,Math.PI*2);
  ctx.fillStyle=rc.dot; ctx.fill(); ctx.strokeStyle=rc.ring; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#111';
  ctx.font=`bold ${Math.max(7,r*.88)}px Segoe UI`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(idx+1,p.sx,p.sy);
  ctx.globalAlpha=1;
  drawLabel(pos.n,pos.x,0.14,pos.z,rc.lbl,10);
}

function drawSpecials(){
  const bp=project(0,0.04,0.15);
  const gr=ctx.createRadialGradient(bp.sx,bp.sy,0,bp.sx,bp.sy,11);
  gr.addColorStop(0,'#fff'); gr.addColorStop(1,curTeam.color+'88');
  ctx.beginPath(); ctx.arc(bp.sx,bp.sy,9,0,Math.PI*2);
  ctx.fillStyle=gr; ctx.fill(); ctx.strokeStyle=curTeam.accent; ctx.lineWidth=2.5; ctx.stroke();
  drawLabel('BATSMAN',0,0.22,0.15,'#fff',9.5);
  const bwp=project(0,0.04,-0.52);
  ctx.beginPath(); ctx.arc(bwp.sx,bwp.sy,7,0,Math.PI*2);
  ctx.fillStyle='#ff9944'; ctx.fill(); ctx.strokeStyle='#cc6600'; ctx.lineWidth=2; ctx.stroke();
  drawLabel('BOWLER',0,0.18,-0.52,'#ffaa55',9);
}

function drawBall(){
  if(!ball.active) return;
  // Trail
  if(ballTrail.length>1){
    for(let i=1;i<ballTrail.length;i++){
      const p0=project(ballTrail[i-1].x,ballTrail[i-1].y,ballTrail[i-1].z);
      const p1=project(ballTrail[i].x,ballTrail[i].y,ballTrail[i].z);
      const alpha=(i/ballTrail.length)*0.4;
      ctx.beginPath(); ctx.moveTo(p0.sx,p0.sy); ctx.lineTo(p1.sx,p1.sy);
      ctx.strokeStyle=`rgba(255,100,30,${alpha})`; ctx.lineWidth=2; ctx.stroke();
    }
  }
  // Ball
  const p=project(ball.x,ball.y,ball.z);
  const r=Math.max(5,10*(p.sc/FS));
  const grd=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r*2.5);
  grd.addColorStop(0,'rgba(255,120,30,0.8)'); grd.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(p.sx,p.sy,r*2.5,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
  ctx.beginPath(); ctx.arc(p.sx,p.sy,r,0,Math.PI*2);
  const bGrd=ctx.createRadialGradient(p.sx-r*.3,p.sy-r*.3,0,p.sx,p.sy,r);
  bGrd.addColorStop(0,'#ee4422'); bGrd.addColorStop(1,'#aa1100');
  ctx.fillStyle=bGrd; ctx.fill();
  ctx.strokeStyle='#ff7755'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(p.sx,p.sy,r*.9,r*.25,Math.PI/4,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawGroundOval(1.08,0.95,'#143a12',null,0);
  for(let i=0;i<14;i++){
    const r=0.06+i*0.065, dark=i%2===0;
    drawGroundOval(r*1.05,r*.93,dark?'rgba(20,80,20,.25)':'rgba(30,100,30,.22)',null,0);
  }
  drawGroundOval(.42,.37,'rgba(25,80,20,.4)',null,0);
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2, p0=project(0,0,0), p1=project(Math.cos(a),0,Math.sin(a)*.88);
    ctx.beginPath(); ctx.moveTo(p0.sx,p0.sy); ctx.lineTo(p1.sx,p1.sy);
    ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=1; ctx.stroke();
  }
  drawGroundOval(.42,.37,null,curTeam.color+'99',1.5,48);
  // 30-yd label
  const lp=project(.42,0.04,0);
  ctx.fillStyle=curTeam.accent+'88'; ctx.font='bold 8px Segoe UI';
  ctx.textAlign='center'; ctx.fillText('30-yd',lp.sx,lp.sy);
  drawGroundOval(1.02,.90,null,curTeam.accent+'cc',3,80);
  for(let i=0;i<32;i++){
    const a=i/32*Math.PI*2, p=project(Math.cos(a)*1.02,.015,Math.sin(a)*.90);
    ctx.beginPath(); ctx.arc(p.sx,p.sy,2,0,Math.PI*2);
    ctx.fillStyle=curTeam.accent+'bb'; ctx.fill();
  }
  drawPitch();
  drawLabel('◀ BATTING END',0,.04,.95,'rgba(255,255,255,.28)',8.5);
  drawLabel('BOWLING END ▶',0,.04,-.95,'rgba(255,255,255,.28)',8.5);
  const pos=curBat.pos, dimmed=ball.active&&ball.phase==='shot';
  const sorted=pos.map((p,i)=>({p,i})).sort((a,b)=>
    project(a.p.x,0,a.p.z).depth-project(b.p.x,0,b.p.z).depth);
  sorted.forEach(({p,i})=>drawPlayer(p,i,dimmed));
  drawSpecials();
  drawBall();
}

  let startTime=null;
  function animate(ts){
    if(!startTime) startTime=ts;
    const elapsed=ts-startTime;
    let cumDur=0;
    for(const ph of phaseDef){
      if(elapsed<cumDur+ph.dur){
        const t=Math.max(0,Math.min(1,(elapsed-cumDur)/ph.dur));
        const pos=bezierPt(ph.from,ph.via,ph.to,t);
        ball.x=pos.x; ball.y=pos.y; ball.z=pos.z; ball.phase=ph.name;
        ballTrail.push({x:pos.x,y:pos.y,z:pos.z});
        if(ballTrail.length>12) ballTrail.shift();
        if(ph.name==='delivery') document.getElementById('phaseInd').textContent='DELIVERY ▶';
        if(ph.name==='impact')   document.getElementById('phaseInd').textContent='💥 IMPACT!';
        if(ph.name==='shot')     document.getElementById('phaseInd').textContent=`→ ${curShot.shot.toUpperCase()}`;
        render();
        animHandle=requestAnimationFrame(animate);
        return;
      }
      cumDur+=ph.dur;
    }
    // Animation complete
    ball.phase='result';
    document.getElementById('phaseInd').classList.remove('show');
    showResult(curShot);
    updateResearchPanel(curShot);
    document.getElementById('startBtn').className='start-btn reset';
    document.getElementById('startBtn').textContent='🔄 NEXT DELIVERY';
    document.getElementById('startBtn').onclick=resetDelivery;
    render();
  }
  animHandle=requestAnimationFrame(animate);
}

function resetDelivery(){
  if(animHandle) cancelAnimationFrame(animHandle);
  ball.active=false; ballTrail=[];
  hideResult();
  document.getElementById('phaseInd').classList.remove('show');
  const btn=document.getElementById('startBtn');
  btn.className='start-btn ready';
  btn.textContent='▶  START DELIVERY';
  btn.onclick=startDelivery;
  const db=document.getElementById('deliveryBox');
  if(db) db.innerHTML=`<div style="color:#445;font-size:.78rem;text-align:center">Press START to bowl a delivery</div>`;
  render();
}

function showResult(shot){
  const ov=document.getElementById('resultOverlay');
  const isCatch=shot.result.startsWith('CAUGHT');
  const isBoundary=shot.result.includes('FOUR')||shot.result.includes('SIX');
  const isDot=shot.result==='DOT BALL';
  document.getElementById('resEmoji').textContent=shot.emoji;
  document.getElementById('resTitle').style.color=isCatch?'#ff6060':isBoundary?'#f5a623':isDot?'#888':'#fff';
  document.getElementById('resTitle').textContent=shot.result;
  document.getElementById('resDetail').textContent=shot.detail;
  const fielderEl=document.getElementById('resFielder');
  if(isCatch){
    fielderEl.style.background='rgba(255,60,60,0.2)';
    fielderEl.style.color='#ff9090';
    fielderEl.style.border='1px solid rgba(255,60,60,0.3)';
    fielderEl.textContent=`Caught: ${shot.targetName} (${shot.catchProb}% success rate)`;
  } else {
    fielderEl.style.background=`rgba(245,166,35,0.15)`;
    fielderEl.style.color='#f5a623';
    fielderEl.style.border='1px solid rgba(245,166,35,0.2)';
    fielderEl.textContent=isBoundary?`${shot.targetName} fielder beaten — gap found!`:`Fielded by ${shot.targetName}`;
  }
  ov.classList.add('show');
  setTimeout(()=>ov.classList.remove('show'),3800);
}

function hideResult(){
  document.getElementById('resultOverlay').classList.remove('show');
}

function updateResearchPanel(shot){
  const rp=document.getElementById('researchPanel');
  if(!rp) return;
  const isCatch=shot.result.startsWith('CAUGHT');
  const prob=shot.catchProb;
  const probColor=prob>=75?'#55e07a':prob>=55?'#f5a623':'#ff6868';
  rp.innerHTML=`
    <h3>🔬 Research Analysis</h3>
    <div class="catch-prob">
      <div class="catch-prob-val" style="color:${isCatch?probColor:'#556'}">${isCatch?prob+'%':'—'}</div>
      <div class="catch-prob-lbl">${isCatch?'Catch success probability':'No catch attempt'}</div>
    </div>
    ${isCatch?`<div class="prob-bar-wrap"><div class="prob-bar-fill" style="width:${prob}%;background:${probColor}"></div></div>`:''}
    <div class="research-stat"><span>Shot Type</span><span style="color:${curTeam.accent}">${shot.shot}</span></div>
    <div class="research-stat"><span>Spin Type</span><span>${shot.spinType}</span></div>
    <div class="research-stat"><span>Reaction Window</span><span>${shot.reactionMs?shot.reactionMs+'ms':'N/A'}</span></div>
    <div class="research-stat"><span>Post-contact Speed</span><span>${shot.ballSpeedPost} kph</span></div>
    <div class="research-stat"><span>Target Fielder</span><span style="color:${isCatch?'#ff9090':'#3dcf7a'}">${shot.targetName}</span></div>
    <div class="research-note">${shot.research}</div>`;
}

// ═══════════════════════════════════════════════════════════════════
// UI BUILD
// ═══════════════════════════════════════════════════════════════════
function showTab(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function buildUI(){
  const tabs=document.getElementById('teamTabs');
  tabs.innerHTML='';
  TEAMS.forEach(t=>{
    const b=document.createElement('button');
    b.className='team-tab';
    b.textContent=t.short;
    b.style.cssText=`background:${t===curTeam?t.color:t.color+'33'};color:${t===curTeam?'#fff':t.accent};`;
    b.onclick=()=>{curTeam=t;curBat=t.batsmen[0];resetDelivery();buildUI();render();};
    tabs.appendChild(b);
  });

  const sb=document.getElementById('sidebar');
  sb.innerHTML='';

  // START BUTTON
  const startBtn=document.createElement('button');
  startBtn.id='startBtn';
  startBtn.className='start-btn ready';
  startBtn.textContent='▶  START DELIVERY';
  startBtn.onclick=startDelivery;
  sb.appendChild(startBtn);

  // DELIVERY BOX
  const dBox=document.createElement('div');
  dBox.id='deliveryBox';
  dBox.className='delivery-box';
  dBox.innerHTML=`<div style="color:#445;font-size:.78rem;text-align:center">Press START to bowl a delivery</div>`;
  sb.appendChild(dBox);

  // BATSMEN
  const h1=document.createElement('h2'); h1.textContent='🏏 Select Batsman'; sb.appendChild(h1);
  curTeam.batsmen.forEach(bat=>{
    const b=document.createElement('button');
    b.className='bat-btn'+(bat===curBat?' active':'');
    b.style.borderColor=bat===curBat?curTeam.color:'#1a2540';
    b.innerHTML=`<div class="nm">${bat.nat} ${bat.name}</div><div class="dt">${bat.hand} · ${bat.style}</div>`;
    b.onclick=()=>{curBat=bat;resetDelivery();buildUI();render();};
    sb.appendChild(b);
  });

  // BATSMAN INFO
  const info=document.createElement('div'); info.className='ibox';
  info.innerHTML=`<h3>🎯 Field Strategy</h3>
    <div class="irow"><span>Batsman</span><span style="color:${curTeam.accent};font-weight:700">${curBat.name}</span></div>
    <div class="irow"><span>Style</span><span>${curBat.hand}</span></div>
    <div class="irow"><span>Key Threat</span><span style="font-size:.7rem">${curBat.threat}</span></div>
    <div style="margin-top:8px;font-size:.76rem;color:${curTeam.accent};background:rgba(0,0,0,.3);padding:7px;border-radius:5px">${curBat.fieldType}</div>`;
  sb.appendChild(info);

  // LEGEND
  const leg=document.createElement('div'); leg.style.marginTop='12px';
  leg.innerHTML='<h2 style="margin-bottom:8px">📍 Positions</h2>'+
    Object.entries(RCOL).map(([k,v],i)=>{
      const descs={wk:'Wicket Keeper',close:'Close Catching',ring:'Ring Field (30yd)',deep:'Deep / Boundary'};
      return`<div class="leg-item"><div class="leg-dot" style="background:${v.dot}"></div><span>${descs[k]}</span></div>`;
    }).join('')+
    `<div class="leg-item"><div class="leg-dot" style="background:#cc2200;border:1px solid #ff6644"></div><span>🏏 Cricket Ball</span></div>`;
  sb.appendChild(leg);

  // RESEARCH PANEL
  const rp=document.createElement('div'); rp.className='research-box'; rp.id='researchPanel';
  rp.innerHTML=`<h3>🔬 Research Analysis</h3>
    <div style="color:#445;font-size:.76rem;text-align:center;padding:12px">
      Bowl a delivery to see catch probability analysis, fielder reaction data, and ball physics breakdown here.
    </div>`;
  sb.appendChild(rp);
}

// ═══════════════════════════════════════════════════════════════════
// MOUSE / TOUCH
// ═══════════════════════════════════════════════════════════════════
const wrap=document.getElementById('cWrap');
wrap.addEventListener('mousedown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',()=>dragging=false);
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  rotY+=(e.clientX-lx)*.008; rotX+=(e.clientY-ly)*.008;
  rotX=Math.max(-1.4,Math.min(-.08,rotX));
  lx=e.clientX;ly=e.clientY;render();
});
wrap.addEventListener('wheel',e=>{
  zoom*=e.deltaY>0?.92:1.08; zoom=Math.max(.45,Math.min(2.2,zoom));
  render(); e.preventDefault();
},{passive:false});
wrap.addEventListener('dblclick',()=>{rotX=-.60;rotY=.18;zoom=1.0;render();});
wrap.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}});
wrap.addEventListener('touchmove',e=>{
  if(!dragging||e.touches.length!==1)return;
  rotY+=(e.touches[0].clientX-lx)*.009; rotX+=(e.touches[0].clientY-ly)*.009;
  rotX=Math.max(-1.4,Math.min(-.08,rotX));
  lx=e.touches[0].clientX;ly=e.touches[0].clientY;render();e.preventDefault();
},{passive:false});
wrap.addEventListener('touchend',()=>dragging=false);

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
buildUI();
render();
</script>
